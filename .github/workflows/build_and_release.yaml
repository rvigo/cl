
name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  format:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
  clippy:
    name: clippy
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - name: Check the lints
        run: |
          cargo clippy -- -D warnings
  test:
    name: test
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Unit Test
        run: |
          cargo test --workspace
        env:
          RUST_BACKTRACE: 1

  release:
    name: Release
    needs: [format, clippy, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate checksums
        run: |
          TAG=${GITHUB_REF_NAME}
          curl -fsSL "https://github.com/rvigo/cl/archive/refs/tags/${TAG}.tar.gz" \
            -o "cl-${TAG}.tar.gz"
          sha256sum "cl-${TAG}.tar.gz" > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            checksums.txt \
            --generate-notes

      - name: Trigger homebrew-cl formula update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SHA256=$(awk '{print $1}' checksums.txt)
          gh api repos/rvigo/homebrew-cl/dispatches \
            --method POST \
            --field event_type=new-release \
            --field "client_payload[tag]=${GITHUB_REF_NAME}" \
            --field "client_payload[sha256]=${SHA256}"